<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body>
    <label>Tên: <input type="text" id="ten_tui"></label>
    <button type="button" id="luu_dl">ok</button>
    <button type="button" id="load_dl">load</button>
    <p id="ten_csdl">??</p>
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwGPorxX6qj7E1E-kOdjbOFoHvs5rXUGA",
            authDomain: "tomisakaewb.firebaseapp.com",
            databaseURL: "https://tomisakaewb-default-rtdb.firebaseio.com",
            projectId: "tomisakaewb",
            storageBucket: "tomisakaewb.appspot.com",
            messagingSenderId: "1052630182822",
            appId: "1:1052630182822:web:3fc29454827e134a047d67",
            measurementId: "G-CB10V6ETBS"
        };


        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        import { getDatabase, ref, child, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const db = getDatabase();

        let ten = document.getElementById("ten_tui");
        let luu = document.getElementById("luu_dl");
        let tai = document.getElementById("load_dl");
        let hien_ten = document.getElementById("ten_csdl");

        function ThemDL() {
            set(ref(db, 'TestCSDL/'), {
                NguoiDung: { Ten: ten.value }
            }).then(() => {
                alert("Them thanh cong");
            }).catch((error) => {
                alert("That bai");
                console.log(error);
            })
        }

        function LayDL() {
            const dbRef = ref(db);
            get(child(dbRef, 'TestCSDL/')).then((snapshot) => {
                if (snapshot.exists()) {
                    hien_ten.innerHTML = snapshot.val().NguoiDung.Ten;
                }
            })
        }

        luu.addEventListener('click', ThemDL);
        tai.addEventListener('click', LayDL);
    </script>
</body>

</html>
