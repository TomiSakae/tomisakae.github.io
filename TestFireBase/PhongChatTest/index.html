<!doctype html>
<html lang="vi">

<head>
	<title>Test</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

	<link rel="stylesheet" href="css/style.css">

</head>

<body>
	<section class="ftco-section">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-6 text-center mb-5">
					<h2 class="heading-section">Test Phòng Chat</h2>
				</div>
			</div>
			<div class="row justify-content-center">
				<div class="login-wrap p-4 p-lg-5">
					<div class="d-flex">
						<div class="w-100">
							<h3 class="mb-4">Đăng Nhập</h3>
						</div>
					</div>
					<div class="form-group mb-3">
						<label class="label" for="name">Tên đăng nhập:</label>
						<input id="ten_dang_nhap" type="text" class="form-control" placeholder="Username" required>
					</div>
					<div class="form-group mb-3">
						<label class="label" for="password">Mật khẩu:</label>
						<input id="mat_khau" type="password" class="form-control" placeholder="Password" required>
					</div>
					<div id="xac_nhan_mk" class="form-group mb-3 d-none">
						<p>Phát hiện tài khoản mới vui lòng nhập lại mật khẩu để đăng ký!</p>
						<label class="label" for="password">Xác nhận mật khẩu:</label>
						<input id="mat_khau_xac_nhan" type="password" class="form-control" placeholder="Password"
							required>
					</div>
					<div id="form_dang_nhap" class="form-group">
						<button id="nut_dang_nhap" type="submit" class="form-control btn btn-primary submit px-3">
							Đăng Nhập</button>
					</div>
					<div id="form_dang_ky" class="form-group d-none">
						<button id="nut_dang_ky" type="submit" class="form-control btn btn-primary submit px-3">
							Đăng Ký</button>
					</div>
				</div>
			</div>
	</section>

	<script type="module">

		import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
		import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js";

		const firebaseConfig = {
			apiKey: "AIzaSyBwGPorxX6qj7E1E-kOdjbOFoHvs5rXUGA",
			authDomain: "tomisakaewb.firebaseapp.com",
			databaseURL: "https://tomisakaewb-default-rtdb.firebaseio.com",
			projectId: "tomisakaewb",
			storageBucket: "tomisakaewb.appspot.com",
			messagingSenderId: "1052630182822",
			appId: "1:1052630182822:web:3fc29454827e134a047d67",
			measurementId: "G-CB10V6ETBS"
		};


		const app = initializeApp(firebaseConfig);
		const analytics = getAnalytics(app);

		import { getDatabase, ref, set, child, get, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";;

		const db = getDatabase();

		let ten_dang_nhap = document.getElementById("ten_dang_nhap");
		let mat_khau = document.getElementById("mat_khau");
		let nut_dang_nhap = document.getElementById("nut_dang_nhap");
		let nut_dang_ky = document.getElementById("nut_dang_ky");

		nut_dang_nhap.addEventListener('click', () => {
			const dbRef = ref(db);
			get(child(dbRef, 'DLNguoiDung/' + ten_dang_nhap.value)).then((snapshot) => {
				if (snapshot.exists()) {
					let kt_mk = snapshot.val().mat_khau;
					if (mat_khau.value == kt_mk) {
						alert("Đăng nhập thành công!");
						localStorage.setItem("ten", ten_dang_nhap.value);
						window.location.href = "chat.html";
					}
					else {
						alert("Mật khẩu không hợp lệ!");
					}
				}
				else {
					document.getElementById("xac_nhan_mk").classList.remove("d-none");
					document.getElementById("form_dang_ky").classList.remove("d-none");
					document.getElementById("form_dang_nhap").classList.add("d-none");
				}
			});
		});

		nut_dang_ky.addEventListener('click', () => {
			let xac_nhan_mk = document.getElementById("mat_khau_xac_nhan");
			if (mat_khau.value == xac_nhan_mk.value) {
				set(ref(db, 'DLNguoiDung/' + ten_dang_nhap.value), {
					ten_dang_nhap: ten_dang_nhap.value,
					mat_khau: mat_khau.value
				});
				alert("Đăng ký thành công!");
				document.getElementById("xac_nhan_mk").classList.add("d-none");
				document.getElementById("form_dang_ky").classList.add("d-none");
				document.getElementById("form_dang_nhap").classList.remove("d-none");
				ten_dang_nhap.value = '';
				mat_khau.value = '';
			}
			else {
				alert("Mật khẩu không hợp lệ!");
			}
		})
	</script>
	<script src="js/jquery.min.js"></script>
	<script src="js/popper.js"></script>
	<script src="js/bootstrap.min.js"></script>
	<script src="js/main.js"></script>

</body>

</html>
