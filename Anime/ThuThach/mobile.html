<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomiSakae</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="../../css/styles.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>

    <!-- The Modal -->
    <div class="modal" id="kt_che_do">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="py-5 px-5 rounded text-center">
                    <h5 class="mb-4">Anime <span id="anime_mua"></span> <span id="anime_nam"></span></h5>
                    <button type="button" class="btn btn-success text-end" data-bs-dismiss="modal"
                        onclick="Chien()">Chiến!</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="ket_thuc_thu_thach">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="py-5 px-5 rounded text-center">
                    <h5 class="mb-4">Chúc mừng bạn đã hoàn thành thử thách với số điểm là: <span
                            id="diem_so_cuoi"></span></h5>
                    <button type="button" class="btn btn-success text-end" data-bs-dismiss="modal"
                        onclick="QuayLai()">Quay Lại</button>
                </div>
            </div>
        </div>
    </div>

    <div id="load" class="vh-100 d-flex justify-content-center align-items-center">
        <p>Đang tải dữ liệu Anime, vui lòng đợi...</p>
    </div>

    <div id="vung_choi" class="vh-100 d-none bg-primary pt-5 px-3">
        <div class="position-relative">
            <div class="position-absolute thoi-gian-mobile bg-light p-2 border rounded">
                <span class="h6 small mt-1">Time: <span id="thoi_gian_con_lai">15</span></span>

            </div>
            <div class="position-absolute so-diem-mobile bg-light p-2 border rounded">
                <span class="h6 small mt-1">Điểm: <span id="diem_so">0</span></span>
            </div>
        </div>

        <div class="text-white text-center">
            <h4>TomiSakae</h4>
            <h6>Trắc Nghiệm Anime Online</h6>
        </div>
        <div class="vung-anime-mobile d-flex flex-column">
            <div class="text-center mt-3">
                <h5 class="mb-2">CHẾ ĐỘ CƠ BẢN</h5>
                <p class="mb-4">Câu <span id="cau_hoi_hien_tai">1</span>/10:</p>
                <img id="anh_cau_hoi" src="" class="anh-anime-mobile h-auto">
            </div>
        </div>
        <div class="mt-3 text-center trac-nghiem-mobile">
            <p id="dap_an1" class="small khung-trac-nghiem khung-trac-nghiem-mobile py-2 px-3"></p>
            <p id="dap_an2" class="small khung-trac-nghiem khung-trac-nghiem-mobile py-2 px-3"></p>
            <p id="dap_an3" class="small khung-trac-nghiem khung-trac-nghiem-mobile py-2 px-3"></p>
            <p id="dap_an4" class="small khung-trac-nghiem khung-trac-nghiem-mobile py-2 px-3"></p>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="js/scripts.js"></script>
</body>

</html>
