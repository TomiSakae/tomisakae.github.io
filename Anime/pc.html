<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomiSakae</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="../css/styles.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>

    <!-- The Modal -->
    <div class="modal" id="kt_che_do">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="py-5 px-5 rounded text-center">
                    <h5 class="mb-4">Anime <span id="anime_mua"></span> <span id="anime_nam"></span></h5>
                    <button type="button" class="btn btn-success text-end" data-bs-dismiss="modal"
                        onclick="Chien()">Chiến!</button>
                </div>
            </div>
        </div>
    </div>

    <div id="load" class="vh-100 d-flex justify-content-center align-items-center">
        <p>Đang tải dữ liệu Anime, vui lòng đợi...</p>
    </div>

    <div id="vung_choi" class="vh-100 d-none bg-primary d-flex flex-column justify-content-center align-items-center">
        <div class="text-white text-center">
            <h3>TomiSakae</h3>
            <h5>Trắc Nghiệm Anime Online</h5>
        </div>
        <div class="vung-dang-nhap-pc d-flex justify-content-center align-items-center">
            <div class="text-center">
                <h5 class="mb-2">THỬ THÁCH</h5>
                <p class="mb-4">Vui lòng chọn chế độ chơi</p>
                <p id="chon_che_do" class="che-do-choi py-2 px-3 d-inline-block">Cơ Bản</p>
                <div class="d-flex flex-column justify-content-center align-items-center mt-2">
                    <button id="nut_bat_dau" type="button" class="btn btn-outline-primary nut-choi-pc rounded mb-3"
                        onclick="BatDau()" data-bs-toggle="modal" data-bs-target="#kt_che_do">Bắt Đầu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="js/scripts.js"></script>
</body>

</html>
