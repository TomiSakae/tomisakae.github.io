<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomiSakae</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>
    <div class="position-absolute thoi-gian-mobile p-2 border rounded">
        <i class="fa-regular fa-clock me-2"></i><span class="h6 small mt-1"><span
                id="thoi_gian_con_lai">100</span></span>

    </div>

    <div class="vung-thu-thap text-center">
        <h5>Anzu Futaba</h5>
        <span><span id="mau_hien_tai">100</span>/<span id="mau_toi_da">100</span></span>
        <div class="thanh-mau-container">
            <div class="thanh-mau"></div>
        </div>
        <img id="anzufutaba" src="../AnimeCard/The_iDOLM@STER_Cinderella_Girls/anzu-futaba-2.jpg" class="w-75 h-auto">
        <div class="vung-thong-tin mt-3 py-2 px-3 d-flex flex-column">
            <h6>Chỉ Số</h6>
            <span class="small">Sức tấn công: 1</span>
        </div>
        <div class="vung-ky-nang mt-3 d-flex justify-content-center align-items-center">
            <div class="vi-tri-anh">
                <img src="../AnimeCard/The_iDOLM@STER_Cinderella_Girls/anzu-futaba-2.jpg" class="anh-ky-nang"
                    data-cooldown-time="5000">
                <div class="cooldown-overlay">
                    <span class="cooldown-text"></span>
                </div>
            </div>
            <div class="vi-tri-anh">
                <img src="../AnimeCard/The_iDOLM@STER_Cinderella_Girls/anzu-futaba-2.jpg" class="anh-ky-nang"
                    data-cooldown-time="5000">
                <div class="cooldown-overlay">
                    <span class="cooldown-text"></span>
                </div>
            </div>
            <div class="vi-tri-anh">
                <img src="../AnimeCard/The_iDOLM@STER_Cinderella_Girls/anzu-futaba-2.jpg" class="anh-ky-nang"
                    data-cooldown-time="5000">
                <div class="cooldown-overlay">
                    <span class="cooldown-text"></span>
                </div>
            </div>
            <div class="vi-tri-anh">
                <img src="../AnimeCard/The_iDOLM@STER_Cinderella_Girls/anzu-futaba-2.jpg" class="anh-ky-nang"
                    data-cooldown-time="5000">
                <div class="cooldown-overlay">
                    <span class="cooldown-text"></span>
                </div>
            </div>
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="js/AnhAnime1.js"></script>
</body>

</html>
