<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomiSakae</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>

    <!-- The Modal -->
    <div class="modal" id="thong_tin_the_bai">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="d-flex justify-content-center align-items-center flex-column">
                        <h5 id="hang_the_bai"></h5>
                        <img id="anh_the_bai" src="" class="w-50 h-auto">
                        <h5 id="ten_the_bai" class="mt-1"></h5>
                        <div>Kỹ năng</div>
                        <div id="ky_nang" class="mt-2 small text-center"></div>
                        <button class="btn btn-outline-primary mt-3">Thu Thập!</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="vung-ham-nguc text-center">
        <h4 class="mb-2">Hầm Ngục</h4>
        <div class="fs-6 mb-3">Chế độ thu thập thẻ bài, lập đội hình, nâng cao sức mạnh và thu thập thẻ bài!</div>
        <div class="khung-ham-nguc-1 px-2 py-3 text-center">
            <div class="mb-3 h6">The iDOLM@STER: Cinderella Girls</div>
            <img id="the_bai1" src="AnimeCard/The_iDOLM@STER_Cinderella_Girls/anzu-futaba-2.jpg"
                class="anh-the-bai h-auto me-2">
            <img id="the_bai2" src="AnimeCard/The_iDOLM@STER_Cinderella_Girls/kaede-takagaki-3.jpg"
                class="anh-the-bai h-auto me-2">
            <img id="the_bai3" src="AnimeCard/The_iDOLM@STER_Cinderella_Girls/mika-jougasaki-3.jpg"
                class="anh-the-bai h-auto me-2">
            <img id="the_bai4" src="AnimeCard/The_iDOLM@STER_Cinderella_Girls/mio-honda-3.jpg"
                class="anh-the-bai h-auto">
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous">
        </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="js/thong_tin_the.js"></script>
</body>

</html>
