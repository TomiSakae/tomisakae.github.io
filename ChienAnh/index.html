<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomiSakae</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- The Modal -->
    <div class="modal" id="thong_tin_the_bai">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="d-flex justify-content-center align-items-center flex-column">
                        <h5 id="hang_the_bai"></h5>
                        <img id="anh_the_bai" src="" class="w-50 h-auto">
                        <h5 id="ten_the_bai" class="mt-1"></h5>
                        <div>Kỹ năng (CD: <span id="hoi_chieu"></span>)</div>
                        <div id="ky_nang" class="mt-2 small text-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="px-4 py-4 text-center">
        <h5 class="mb-3">Đội Hình</h5>
        <img id="o_trong1" src="AnimeCard/icon_plus.png" class="loai_bo1 anh-the-bai h-auto me-2 khung-anh">
        <img id="o_trong2" src="AnimeCard/icon_plus.png" class="loai_bo2 anh-the-bai h-auto me-2 khung-anh">
        <img id="o_trong3" src="AnimeCard/icon_plus.png" class="loai_bo3 anh-the-bai h-auto me-2 khung-anh">
        <img id="o_trong4" src="AnimeCard/icon_plus.png" class="loai_bo4 anh-the-bai h-auto khung-anh">
        <div id="vung_xep_doi_hinh" class="vung-chon-the-bai mt-3">

        </div>
        <button id="reset_doi_hinh" class="mx-2 mt-3 btn btn-outline-primary">Reset</button>
        <button id="vao_chien_anh" class="mt-3 mx-2 btn btn-outline-primary">Chiến!</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous">
        </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="js/CSDL.js"></script>
    <script src="js/thong_tin_the.js"></script>
</body>

</html>
