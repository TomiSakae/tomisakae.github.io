<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomiSakae</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body id="noi_thu_thap" class="d-none">

    <div class="modal" id="hien_chi_so_thu_thap">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="mx-3">
                        <h6 class="text-center">Chỉ số hiện tại:</h6>
                        <div class="my-1">Phòng Thủ: 0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="hien_vung_ky_nang_thu_thap">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <p class="text-center">Không có kỹ năng nào đang kích hoạt</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="hien_vung_tinh_nang">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="hien_vung_ky_nang_anh">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <p class="text-center">Không có kỹ năng nào đang kích hoạt</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="hien_chi_so_anh">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="mx-3">
                        <h6 class="text-center">Chỉ số hiện tại:</h6>
                        <div class="my-1">Sức Tấn Công: 1</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="icon-container d-flex flex-column justify-content-center align-items-center">
        <i class="fa-solid fa-bars my-2 fs-5" data-bs-toggle="modal" data-bs-target="#hien_chi_so_thu_thap"></i>
        <i class="fa-solid fa-bolt my-2 fs-5" data-bs-toggle="modal" data-bs-target="#hien_vung_ky_nang_thu_thap"></i>
        <i class="fa-solid fa-star my-2 fs-5" data-bs-toggle="modal" data-bs-target="#hien_vung_tinh_nang"></i>
        <i class="fa-solid fa-bolt my-2 fs-5" data-bs-toggle="modal" data-bs-target="#hien_vung_ky_nang_anh"></i>
        <i class="fa-solid fa-bars my-2 fs-5" data-bs-toggle="modal" data-bs-target="#hien_chi_so_anh"></i>
    </div>

    <div class="modal" id="hien_buff">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <p class="text-center">Không có buff nào đang kích hoạt</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="hien_debuff">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="text-end"><button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <p class="text-center">Không có debuff nào đang kích hoạt</p>
                </div>
            </div>
        </div>
    </div>

    <div class="icon-container-buff d-flex flex-column justify-content-center align-items-center">
        <i class="fa-solid fa-circle-down my-2 fs-5" data-bs-toggle="modal" data-bs-target="#hien_debuff"></i>
        <i class="fa-solid fa-circle-up my-2 fs-5" data-bs-toggle="modal" data-bs-target="#hien_buff"></i>
    </div>

    <div class="modal" id="ket_thuc_thu_thap" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="modal-body">
                    <div class="py-5 text-center">
                        <p id="thang_thua"></p>
                        <button type="button" class="btn btn-success text-end mt-3" data-bs-dismiss="modal"
                            onclick="QuayLai()">Quay Lại</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="position-absolute thoi-gian-mobile p-2 rounded">
        <i class="fa-regular fa-clock me-2"></i><span class="h6 small mt-1"><span
                id="thoi_gian_con_lai">100</span></span>

    </div>
    <div class="vung-thu-thap text-center">
        <h5>Anzu Futaba</h5>
        <div id="mau_bao_ve1" class="an-mau">
            <span class="d-flex justify-content-between">
                <div class="mt-1"><span id="sl_thanh_mau">x0</span></div>
                <div class="mt-1"><span id="mau_hien_tai">100</span>/<span id="mau_toi_da">100</span></div>
            </span>
            <div class="thanh-mau-container">
                <div class="thanh-mau"></div>
            </div>
        </div>
        <img id="nhan_anh_thu_thap" src="../AnimeCard/The_iDOLM@STER_Cinderella_Girls/anzu-futaba-2.jpg"
            class="w-75 h-auto">
        <div id="thong_tin_tran_dau" class="vung-thong-tin mt-2 py-2 px-3 d-flex flex-column">

        </div>
        <div id="noi_hien_anh" class="vung-ky-nang mt-2 d-flex justify-content-center align-items-center">

        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="js/ChienAnh.js"></script>
</body>

</html>
