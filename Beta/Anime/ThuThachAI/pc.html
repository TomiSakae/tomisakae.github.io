<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomiSakae</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="../../css/styles.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>

    <!-- The Modal -->
    <div class="modal" id="kt_che_do" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="py-5 px-5 rounded text-center">
                    <h5 class="mb-4">Anime TV <span class="anime_mua"></span> <span class="anime_nam"></span></h5>
                    <button type="button" class="btn btn-success text-end" data-bs-dismiss="modal"
                        onclick="Chien()">Chiến!</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="ket_thuc_thu_thach" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Modal body -->
                <div class="py-5 px-5 rounded text-center">
                    <h5 class="mb-3">Anime TV <span class="anime_mua"></span> <span class="anime_nam"></span></h5>
                    <h5 class="mb-4">Kết Quả:</h5>
                    <div id="tong_ket_qua">

                    </div>
                    <h5 class="mt-3">Số câu đúng:</h5>
                    <p><span id="so_cau_dung"></span>/10</p>
                    <div id="hoan_hao" class="d-none">
                        <h5 class="mt-3">Hoàn Hảo!</h5>
                        <p>X2 điểm</p>
                    </div>
                    <h5 class="mt-3">Điểm tổng:</h5>
                    <p><span id="tong_so_diem"></span></p>
                    <button type="button" class="btn btn-success text-end mt-3" data-bs-dismiss="modal"
                        onclick="QuayLai()">Quay Lại</button>
                </div>
            </div>
        </div>
    </div>

    <div id="load" class="vh-100 mx-3 d-flex flex-column justify-content-center align-items-center">
        <p>Đang tải dữ liệu Anime, vui lòng đợi...</p>
        <div id="progress-container" class="progress do-dai-tien-trinh-pc">
            <div id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <p id="phan_tram_load" class="mt-3">0%</p>
    </div>

    <div id="vung_choi" class="vh-100 d-none bg-primary d-flex flex-column justify-content-center align-items-center">
        <div class="text-white text-center">
            <h3>TomiSakae</h3>
            <h5>Trắc Nghiệm Anime Online</h5>
        </div>
        <div class="vung-dang-nhap-pc d-flex flex-column">
            <div class="nav-thong-tin px-5 py-2 d-flex text-white justify-content-between">
                <span class="h5 mt-1"><i class="fa-regular fa-clock me-2"></i><span
                        id="thoi_gian_con_lai">15</span></span>
                <span class="h5 mt-1"><i class="fa-solid fa-coins me-2"></i><span id="diem_so">0</span></span>
            </div>
            <div class="text-center mt-3">
                <h5 class="mb-2">CHẾ ĐỘ AI</h5>
                <p class="mb-4">Câu <span id="cau_hoi_hien_tai">1</span>/10:</p>
            </div>

            <div id="tai_cau_hoi" class="text-center mt-5">
                <h6>Đang tải câu hỏi...</h6>
                <img src="../../img/load_anh_gif.gif" class="w-25 h-auto">
            </div>

            <div id="tai_xong_cau_hoi" class="row mx-5 d-none">
                <div class="col-5">
                    <p id="ai_cau_hoi" class="d-none animate__animated animate__fadeIn"></p>
                </div>
                <div id="load_anh"
                    class="col-6 d-none d-flex flex-column justify-content-center align-items-center text-center animate__animated animate__fadeIn">
                    <p id="dap_an1" class="khung-trac-nghiem py-2 px-3"></p>
                    <p id="dap_an2" class="khung-trac-nghiem py-2 px-3"></p>
                    <p id="dap_an3" class="khung-trac-nghiem py-2 px-3"></p>
                    <p id="dap_an4" class="khung-trac-nghiem py-2 px-3"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script type="importmap">
            {
              "imports": {
                "@google/generative-ai": "https://esm.run/@google/generative-ai"
              }
            }
          </script>
    <script src="js/scripts.js" type="module"></script>
</body>

</html>
