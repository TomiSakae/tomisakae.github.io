<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Túi Đồ</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="thanh_tien_trinh" data-page="0">

    </div>

    <div class="modal" id="hop_canh_bao">
        <div class="modal-dialog">
            <div class="modal-content">

                <!-- Modal Header -->
                <div class="modal-header">
                    <h4 class="modal-title">Isekai Quest</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Modal body -->
                <div class="modal-body">
                    <p>Bạn không cảm thấy đói!</p>
                    <button type="button" class="btn btn-outline-success" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="container mt-3">
            <h3>Túi đồ:</h3>
            <button v-show="tui" type="button" class="btn btn-outline-primary" v-on:click="MoTui">Mở túi</button>
            <div v-html="du_lieu_tui_do"></div>

        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="scripts/ThucAn.js"></script>
    <script src="scripts/TuiDo.js"></script>
    <script src="vue/TuiDo.vue.js"></script>
    <script src="../../scripts/DLThanhTienTrinh.js"></script>
    <script src="../../vue/ThanhTienTrinh.vue.js"></script>
</body>

</html>
