<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Thông Tin Nhân Vật</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="thanh_tien_trinh" data-page="0">

    </div>

    <div id="app">
        <div class="container mt-3">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title">Thông tin và trạng thái</h4>
                    <p class="card-text">Tên: {{ten_nv}}</p>
                    <p class="card-text">Máu: {{mau_nv}}</p>
                    <p class="card-text">Đói: {{doi_nv}}</p>
                    <p class="card-text">Khát: {{khat_nv}}</p>
                    <p class="card-text">Thể lực: {{the_luc_nv}}</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="scripts/ThongTinNV.js"></script>
    <script src="vue/ThongTinNV.vue.js"></script>
    <script src="../../scripts/DLThanhTienTrinh.js"></script>
    <script src="../../vue/ThanhTienTrinh.vue.js"></script>
</body>

</html>
