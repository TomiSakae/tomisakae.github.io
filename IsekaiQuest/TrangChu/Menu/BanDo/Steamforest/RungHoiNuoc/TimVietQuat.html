<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Tìm Việt Quất</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div id="thanh_tien_trinh" data-page="0"></div>


    <div id="app">
        <div v-html="hop_canh_bao"></div>

        <div class="container mt-3">
            <h2>Khu vực Rừng hơi nước:</h2>
            <div class="row">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title" data-bs-toggle="collapse" data-bs-target="#bdl1">Tìm việt quất:
                        </h4>
                        <p class="card-text">Tỉ lệ tìm thấy: {{ti_le_trai_cay}}% </p>
                        <p class="card-text">Số lượng việt quất: {{so_luong_trai_cay}}</p>
                        <p class="card-text">Thời gian hiện tại: {{gio_hien_tai}}</p>
                        <button id="nut_canh_bao" type="button" class="btn btn-outline-primary" data-bs-toggle=""
                            data-bs-target="" v-on:click="TimTraiCay">Tìm</button>
                    </div>
                </div>
            </div>

            <div class="row pt-2">
                <div v-html="canh_bao">

                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="../../../../../scripts/ResetNgay.js"></script>
    <script src="../../../../../scripts/HamTuTao.js"></script>
    <script src="../../../../scripts/DLThanhTienTrinh.js"></script>
    <script src="../../../../vue/ThanhTienTrinh.vue.js"></script>
    <script src="scripts/VietQuat.js"></script>
    <script src="scripts/TimTraiCay.js"></script>
    <script src="vue/TimTraiCay.vue.js"></script>
</body>

</html>
