<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Isekai Quest</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- <link rel="stylesheet" href="styles/styles.css"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container p-5 my-5 border">
        <h1>Isekai Quest</h1>
        <div id="chuyen_tiep1" class="">
            <p>Chào mừng đến với Web text Game: Isekai Quest!</p>
        </div>

        <div id="chuyen_tiep2" class="d-none">
            <form class="was-validated">
                <div class="mb-3 mt-3">
                    <label for="nhap_ten" class="form-label">Vui lòng nhập tên nhân vật:</label>
                    <input type="text" class="form-control" id="nhap_ten" name="ten_nhan_vat" required>
                    <div class="valid-feedback">Tên hợp lệ.</div>
                    <div class="invalid-feedback">Tên không được phép để trống!</div>
                </div>
            </form>
        </div>
        <button type="button" class="btn btn-outline-primary" onclick="ChuyenTiep()">Tiếp tục</button>
    </div>

    <script src="scripts/ChuyenTiep.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
